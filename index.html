<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Log</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Battle Log</h1>

  <div class="stats">
    試合:<span id="total"></span> |
    勝:<span id="wins"></span> |
    負:<span id="loses"></span> |
    勝率:<span id="rate"></span> |
    K/D:<span id="kd"></span> |
    平均塗り:<span id="avgPaint"></span>
  </div>
</header>

<!-- タブ -->
<div class="tabs">
  <button onclick="showTab('inputTab')">入力</button>
  <button onclick="showTab('listTab')">戦績</button>
  <button onclick="showTab('chartTab')">グラフ</button>
  <button onclick="showTab('rankTab')">ランク</button>
</div>

<!-- 入力 -->
<section id="inputTab" class="tab active">

  <select id="battleType"></select>
  <select id="rule"></select>
  <select id="stage"></select>
  <select id="weapon"></select>

  <select id="result">
    <option value="win">勝ち</option>
    <option value="lose">負け</option>
    <option value="disconnect">通信切断</option>
    <option value="invalid">無効試合</option>
  </select>

  <input id="kill" type="number" placeholder="キル">
  <input id="assist" type="number" placeholder="アシスト">
  <input id="death" type="number" placeholder="デス">
  <input id="paint" type="number" placeholder="塗りポイント">
  <input id="special" type="number" placeholder="スペシャル回数">

  <button id="saveBtn">保存</button>

</section>

<!-- 戦績 -->
<section id="listTab" class="tab">
  <div id="list"></div>
</section>

<!-- グラフ -->
<section id="chartTab" class="tab">
  <div id="chart"></div>
</section>

<!-- ランク -->
<section id="rankTab" class="tab">
  <div id="rankBig"></div>
</section>

<script src="app.js"></script>
</body>
</html>
