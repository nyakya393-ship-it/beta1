<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Log</title>

<!-- 🎨 splatoon風フォント -->
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Battle Log</h1>

  <div class="stats">
    試合:<span id="total"></span> |
    勝:<span id="wins"></span> |
    負:<span id="loses"></span> |
    勝率:<span id="rate"></span> |
    K/D:<span id="kd"></span> |
    平均塗り:<span id="avgPaint"></span>
  </div>
</header>

<!-- フィルター -->
<section class="filter">
  <select id="filterRule">
    <option value="">全部ルール</option>
    <option>ナワバリバトル</option>
    <option>ガチエリア</option>
    <option>ガチヤグラ</option>
    <option>ガチホコ</option>
    <option>ガチアサリ</option>
  </select>

  <select id="filterWeapon"></select>
</section>

<!-- 入力 -->
<section class="form">

  <select id="battleType">
    <option>レギュラーマッチ</option>
    <option>バンカラマッチ(チャレンジ)</option>
    <option>バンカラマッチ(オープン)</option>
    <option>Xマッチ</option>
    <option>イベントマッチ</option>
    <option>フェスマッチ(チャレンジ)</option>
    <option>フェスマッチ(オープン)</option>
    <option>トリカラバトル</option>
    <option>プライベートマッチ</option>
  </select>

  <select id="rule">
    <option>ナワバリバトル</option>
    <option>ガチエリア</option>
    <option>ガチヤグラ</option>
    <option>ガチホコ</option>
    <option>ガチアサリ</option>
  </select>

  <select id="stage"></select>

  <input id="weaponSearch" placeholder="武器検索">
  <select id="weapon"></select>

  <select id="result">
    <option value="win">勝ち</option>
    <option value="lose">負け</option>
  </select>

  <input id="kill" type="number" placeholder="キル">
  <input id="assist" type="number" placeholder="アシスト">
  <input id="death" type="number" placeholder="デス">
  <input id="paint" type="number" placeholder="塗りポイント">
  <input id="special" type="number" placeholder="スペシャル回数">

  <button id="saveBtn">保存</button>

</section>

<!-- 一覧 -->
<section id="list"></section>

<script src="app.js"></script>
</body>
</html>
