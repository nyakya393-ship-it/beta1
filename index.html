<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stat Like App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Battle Log</h2>
</header>

<!-- 入力 -->
<section class="card">

  <select id="weapon"></select>
  <select id="stage"></select>
  <select id="rule"></select>
  <select id="battleType"></select>

  <select id="result">
    <option value="win">勝ち</option>
    <option value="lose">負け</option>
  </select>

</section>

<!-- 数値入力（片手UI） -->
<section class="grid">

  <div class="numBox">
    <label>キル</label>
    <div class="btnRow">
      <button onclick="change('kill',-1)">−</button>
      <input id="kill" type="number" value="0">
      <button onclick="change('kill',1)">＋</button>
    </div>
  </div>

  <div class="numBox">
    <label>アシスト</label>
    <div class="btnRow">
      <button onclick="change('assist',-1)">−</button>
      <input id="assist" type="number" value="0">
      <button onclick="change('assist',1)">＋</button>
    </div>
  </div>

  <div class="numBox">
    <label>デス</label>
    <div class="btnRow">
      <button onclick="change('death',-1)">−</button>
      <input id="death" type="number" value="0">
      <button onclick="change('death',1)">＋</button>
    </div>
  </div>

  <div class="numBox">
    <label>塗り</label>
    <div class="btnRow">
      <button onclick="change('paint',-10)">−</button>
      <input id="paint" type="number" value="0">
      <button onclick="change('paint',10)">＋</button>
    </div>
  </div>

</section>

<!-- 保存 -->
<button class="saveBtn" onclick="saveBattle()">保存</button>

<!-- 統計 -->
<section class="stats">

  <h3>統計</h3>
  <div id="summary"></div>

  <h3>武器ランキング</h3>
  <div id="weaponRank"></div>

  <h3>ステージランキング</h3>
  <div id="stageRank"></div>

</section>

<script src="app.js"></script>
</body>
</html>
