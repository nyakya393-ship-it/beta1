<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkLog v0.8</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">
      <h1>🦑 InkLog</h1>
      <p>Battle Tracker</p>
    </div>
  </aside>

  <main class="main">

    <!-- 統計 -->
    <section class="dashboard">

      <div class="stat-card">
        <h3>試合数</h3>
        <div class="number" id="totalBattles">0</div>
      </div>

      <div class="stat-card">
        <h3>勝ち</h3>
        <div class="number" id="winCount">0</div>
      </div>

      <div class="stat-card">
        <h3>負け</h3>
        <div class="number" id="loseCount">0</div>
      </div>

      <div class="stat-card">
        <h3>勝率</h3>
        <div class="number" id="winRate">--%</div>
      </div>

      <div class="stat-card">
        <h3>平均K/D</h3>
        <div class="number" id="kdRatio">--</div>
      </div>

    </section>

    <!-- 入力 -->
    <section class="card">

      <h2>戦績入力</h2>

      <form id="battleForm">

        <select id="rule">
          <option>ナワバリ</option>
          <option>ガチエリア</option>
          <option>ガチヤグラ</option>
          <option>ガチホコ</option>
          <option>ガチアサリ</option>
        </select>

        <select id="result">
          <option value="win">勝ち</option>
          <option value="lose">負け</option>
          <option value="disconnect">通信切断</option>
          <option value="invalid">無効試合</option>
        </select>

        <input id="weapon" placeholder="武器">
        <input id="kill" type="number" value="0" placeholder="キル">
        <input id="death" type="number" value="0" placeholder="デス">
        <input id="count" type="number" placeholder="カウント">
        <input id="memo" placeholder="メモ">

        <button type="submit">保存</button>

      </form>

    </section>

    <!-- 一覧 -->
    <section class="card">
      <h2>戦績一覧</h2>
      <div id="list"></div>
    </section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
