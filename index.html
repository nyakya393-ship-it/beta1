<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Log</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Battle Log</h1>

<!-- タブ -->
<div class="tabbar">
  <div class="tab active" data-tab="input">入力</div>
  <div class="tab" data-tab="battle">戦績</div>
  <div class="tab" data-tab="analysis">分析</div>
</div>

<!-- 入力 -->
<section id="input" class="page active">

  <div class="center">

    <select id="weapon"></select>
    <select id="stage"></select>
    <select id="rule"></select>
    <select id="battleType"></select>

    <select id="result">
      <option value="win">勝ち</option>
      <option value="lose">負け</option>
    </select>

    <input id="kill" type="number" placeholder="キル">
    <input id="assist" type="number" placeholder="アシスト">
    <input id="death" type="number" placeholder="デス">
    <input id="paint" type="number" placeholder="塗り">
    <input id="special" type="number" placeholder="スペシャル">

    <button onclick="saveBattle()">保存</button>

  </div>

</section>

<!-- 戦績 -->
<section id="battle" class="page">
  <div id="battleList"></div>
</section>

<!-- 分析 -->
<section id="analysis" class="page">
  <div id="summary"></div>
</section>

<script src="app.js"></script>
</body>
</html>
