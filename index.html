<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stat-like</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>戦績ダッシュボード</h1>

  <div class="stats">
    <div>試合 <span id="totalBattles">0</span></div>
    <div>勝 <span id="wins">0</span></div>
    <div>負 <span id="loses">0</span></div>
    <div>勝率 <span id="winRate">0%</span></div>
    <div>K/D <span id="kd">0</span></div>
    <div>平均塗り <span id="avgPaint">0</span></div>
  </div>
</header>

<!-- =====================
 フィルター
===================== -->
<section class="filter">

  <select id="filterRule">
    <option value="">全部ルール</option>
    <option>ナワバリバトル</option>
    <option>ガチエリア</option>
    <option>ガチヤグラ</option>
    <option>ガチホコ</option>
    <option>ガチアサリ</option>
  </select>

  <select id="filterWeapon"></select>

</section>

<!-- =====================
 入力フォーム（これが重要）
===================== -->
<section class="form">

  <select id="battleType">
    <option>レギュラーマッチ</option>
    <option>バンカラ(チャレンジ)</option>
    <option>バンカラ(オープン)</option>
    <option>Xマッチ</option>
    <option>フェスマッチ</option>
    <option>プライベートマッチ</option>
  </select>

  <select id="rule">
    <option>ナワバリバトル</option>
    <option>ガチエリア</option>
    <option>ガチヤグラ</option>
    <option>ガチホコ</option>
    <option>ガチアサリ</option>
  </select>

  <select id="stage"></select>

  <input id="weaponSearch" placeholder="武器検索">
  <select id="weapon"></select>

  <select id="result">
    <option value="win">勝ち</option>
    <option value="lose">負け</option>
  </select>

  <input id="kill" type="number" placeholder="キル">
  <input id="assist" type="number" placeholder="アシスト">
  <input id="death" type="number" placeholder="デス">
  <input id="paint" type="number" placeholder="塗りポイント">
  <input id="special" type="number" placeholder="スペシャル回数">

  <textarea id="memo" placeholder="メモ"></textarea>

  <button id="saveBtn">保存</button>

</section>

<!-- =====================
 表示
===================== -->
<section id="rank"></section>
<section id="list"></section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
