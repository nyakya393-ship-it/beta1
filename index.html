<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkLog v2 FULL</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  InkLog v2 FULL
</header>

<main>

  <!-- ダッシュボード -->
  <div class="dashboard">

    <div class="card stat">
      <h3>総試合数</h3>
      <div id="totalBattles">0</div>
    </div>

    <div class="card stat">
      <h3>勝率</h3>
      <div id="winRate">0%</div>
    </div>

    <div class="card stat">
      <h3>勝ち</h3>
      <div id="wins">0</div>
    </div>

    <div class="card stat">
      <h3>負け</h3>
      <div id="loses">0</div>
    </div>

  </div>

  <!-- 入力 -->
  <div class="card">
    <h2>戦績入力</h2>

    <form id="battleForm">

      <label>武器</label><br>
      <select id="weapon"></select>

      <br><br>

      <label>ルール</label><br>
      <select id="rule">
        <option>ナワバリ</option>
        <option>ガチエリア</option>
        <option>ガチヤグラ</option>
        <option>ガチホコ</option>
        <option>ガチアサリ</option>
      </select>

      <br><br>

      <label>勝敗</label><br>
      <select id="result">
        <option value="win">勝ち</option>
        <option value="lose">負け</option>
        <option value="disconnect">通信切断</option>
        <option value="invalid">無効試合</option>
      </select>

      <br><br>

      <label>キル</label>
      <input id="kill" type="number">

      <label>デス</label>
      <input id="death" type="number">

      <br><br>

      <label>メモ</label><br>
      <input id="memo" type="text">

      <br><br>

      <button type="submit">保存</button>

    </form>
  </div>

  <!-- グラフ -->
  <div class="card">
    <h2>勝率グラフ</h2>
    <canvas id="winChart" width="300" height="300"></canvas>
  </div>

  <!-- 一覧 -->
  <div class="card">
    <h2>戦績一覧</h2>
    <div id="list"></div>
  </div>

</main>

<script src="app.js"></script>

</body>
</html>
